<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Traffic Alert</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: url('https://cdn.pixabay.com/photo/2023/11/03/15/03/waterfall-8363216_1280.jpg') center/cover no-repeat;
            color: #fff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #e74c3c;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            max-width: 600px; /* Set a maximum width for better readability on larger screens */
            width: 100%;
            box-sizing: border-box;
        }

        p {
            margin-bottom: 20px;
        }

        .refresh-btn {
            padding: 15px 30px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .refresh-btn:hover {
            background-color: #2980b9;
        }

        .support-image {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 30px 10px; /* Adjust padding for smaller screens */
            }

            .container {
                padding: 15px;
            }

            .refresh-btn {
                padding: 10px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>High Traffic Alert</h1>
        <p>Too many students are currently accessing the site, causing increased traffic.</p>
        <p>Please try again later.</p>
        <a href="#" class="refresh-btn" onclick="location.reload(true);">Refresh Page</a>
    </div>
    <!-- You can add an additional image if needed -->
    <!-- <img src="https://example.com/path-to-your-support-image.jpg" alt="Support Image" class="support-image"> -->
</body>
</html>
