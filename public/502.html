<!DOCTYPE html>
<html>
<head>
    <title>UNIMAID</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 28px;
            color: #333;
        }

        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .refresh-button {
            font-size: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .refresh-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>High Traffic Alert</h1>
    <p>Sorry, the site is currently experiencing a high volume of traffic.</p>
    <p>Please click the button below to refresh the page or try again later.</p>
    <button class="refresh-button" onclick="location.reload()">Refresh</button>
</body>
</html>
